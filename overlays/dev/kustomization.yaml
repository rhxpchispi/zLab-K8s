  
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: java-app
- patch: |
    - op: replace
      path: /spec/ports/0/nodePort
      value: 30001
  target:
    kind: Service
    name: java-app-service

configMapGenerator:
- literals:
  - APP_ENV=development
  - WELCOME_MESSAGE=Bienvenido al Ambiente de des a rollo :)
  - VERSION=1.0.0-dev
  - API_URL=http://dev-api.example.com
  - APP_COLOR=lightgreen
  name: app-config
  namespace: dev-ns
  options:
    disableNameSuffixHash: true

images:
- name: rhxpchispi/zlab-java-app
  newName: rhxpchispi/zlab-java-app
  newTag: dev-12
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: dev-ns
