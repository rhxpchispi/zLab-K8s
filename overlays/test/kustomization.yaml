  
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: java-app
- patch: |
    - op: replace
      path: /spec/ports/0/nodePort
      value: 30002
  target:
    kind: Service
    name: java-app-service

configMapGenerator:
- literals:
  - APP_ENV=testing
  - WELCOME_MESSAGE=Bienvenido al Ambiente de Testing
  - VERSION=1.0.0-test
  - API_URL=http://test-api.example.com
  - APP_COLOR=lightblue
  name: app-config
  namespace: test-ns
  options:
    disableNameSuffixHash: true

images:
- name: rhxpchispi/zlab-java-app
  newName: rhxpchispi/zlab-java-app
  newTag: test-13
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: test-ns
