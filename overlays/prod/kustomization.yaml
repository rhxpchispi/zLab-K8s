  
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: java-app
- patch: |
    - op: replace
      path: /spec/ports/0/nodePort
      value: 30003
  target:
    kind: Service
    name: java-app-service

configMapGenerator:
- literals:
  - APP_ENV=production
  - WELCOME_MESSAGE=Bienvenido al Ambiente de Producción
  - VERSION=1.0.0
  - API_URL=http://api.example.com
  - APP_COLOR=lightcoral
  name: app-config
  namespace: dev-ns
  options:
    disableNameSuffixHash: true

images:
- name: rhxpchispi/zlab-java-app
  newName: rhxpchispi/zlab-java-app
  newTag: prod-14
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: prod-ns
